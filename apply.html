<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply for a Degree</title>
</head>

<body>

<h1>Reading University</h1>

<h2>Degree Application</h2>

<form>

    <p>
        <label for="level">Degree Level</label><br>

        <select id="level">

            <option>Associate</option>
            <option>Bachelor</option>
            <option>Master</option>
            <option>Doctorate</option>

        </select>
    </p>

    <p>
        <label for="major">Major</label><br>

        <select id="major">

            <option>Biology</option>
            <option>History</option>
            <option>Psychology</option>
            <option>Literature</option>
            <option>Philosophy</option>
            <option>Other</option>

        </select>
    </p>

    <p>
        <label for="customMajor">If Other:</label><br>

        <input
            type="text"
            id="customMajor"
            placeholder="Type your custom major">
    </p>

    <button type="submit">

        Continue to Degree Planner

    </button>

</form>
<script>

const major = document.getElementById("major");
const custom = document.getElementById("customMajor");

custom.style.display = "none";

major.addEventListener("change", function(){

    if(major.value === "Other"){
        custom.style.display = "block";
    }

    else{
        custom.style.display = "none";
    }

});

</script>
</body>
</html>
